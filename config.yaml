data_engine:
  provider: "alpaca"
  storage_path: "data/uqts_bitemporal.ddb"
  start_date: "2016-01-01"
  features:
    - close
    - volume

signal_physics:
  lookback_days: 63
  horizon_days: 21
  math_padding: 100
  fractional_differentiation:
    d_param: 0.4
  wavelet_transform:
    scales: [1, 2, 4, 8, 16, 32, 64, 128]
    wavelet: "mexh"

model_pipeline:
  model_path: "models/challenger_v1.pt"
  architecture:
    hidden_dim: 64
    vit_heads: 4
    gnn_layers: 2
  training:
    lr: 0.002
    epochs: 25
    batch_size: 1024
    early_stopping_patience: 3
    weight_decay: 0.0001
    dropout: 0.4

risk_metacontroller:
  prior_belief: 0.75             # Confirmed Alpha Edge (IC 0.036) justification

execution_muscle:
  oms:
    base_url: "https://paper-api.alpaca.markets"
  mpc_solver:
    horizon: 5
    impact_penalty: 0.01
    variance_penalty: 0.1
  min_belief_threshold: 0.65     # Don't trade if Bayesian belief drops below this
  max_position_size: 0.05        # 5% max allocation per ticker
