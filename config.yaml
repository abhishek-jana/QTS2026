data_engine:
  features:
  - close
  - volume
  provider: alpaca
  start_date: '2016-01-01'
  storage_path: data/uqts_v2_intraday.ddb
  timeframe: 15Min
execution_muscle:
  allocation_temperature: 0.1
  latency_stress_test: true
  max_position_size: 0.5
  max_single_asset_cap: 0.5
  min_belief_threshold: 0.65
  mpc_solver:
    horizon: 5
    impact_penalty: 0.01
    variance_penalty: 0.1
  oms:
    base_url: https://paper-api.alpaca.markets
  risk_parity_sizing: false
  safety_limits:
    kill_switch_enabled: true
    max_notional_per_order: 50000.0
    max_total_leverage: 3.0
  trading_mode: paper
model_pipeline:
  architecture:
    gnn_layers: 2
    hidden_dim: 128
    vit_heads: 8
  evaluation_dataset_path: data/oos_steps_v2.pt
  model_path: models/challenger_v2.pt
  rl_training:
    total_timesteps: 1000000
  timeframes:
    temporal_decay_lambda: 0.0025
    test_end: now
    test_start: '2024-01-01'
    train_end: '2023-12-31'
    train_start: '2019-01-01'
    validation_split_pct: 0.15
  training:
    batch_size: 512
    dropout: 0.3
    early_stopping_patience: 15
    epochs: 100
    lr: 0.005
    weight_decay: 0.0001
  training_dataset_path: data/train_dataset_v2_full.pt
risk_metacontroller:
  prior_belief: 0.5
rl_training_physics:
  allocation_temperature: 0.5
  max_single_asset_cap: 0.15
signal_physics:
  fractional_differentiation:
    d_param: 0.0
  horizon_days: 3
  lookback_days: 63
  math_padding: 250
  wavelet_transform:
    scales:
    - 1
    - 2
    - 3
    - 4
    - 6
    - 8
    - 12
    - 16
    - 24
    - 32
    - 48
    - 64
    - 96
    - 128
    - 192
    - 256
    wavelet: mexh
ui_cockpit:
  update_interval_ms: 1000
