data_engine:
  features:
  - close
  - volume
  provider: tiingo
  start_date: '2016-01-01'
  storage_path: data/uqts_v2_intraday.ddb
  timeframe: 15Min
execution_muscle:
  max_position_size: 0.15
  min_belief_threshold: 0.65
  mpc_solver:
    horizon: 5
    impact_penalty: 0.01
    variance_penalty: 0.1
  oms:
    base_url: https://paper-api.alpaca.markets
  safety_limits:
    kill_switch_enabled: true
    max_notional_per_order: 50000.0
    max_total_leverage: 3.0
  trading_mode: sim
model_pipeline:
  architecture:
    gnn_layers: 2
    hidden_dim: 64
    vit_heads: 4
  evaluation_dataset_path: data/oos_steps_v2.pt
  model_path: models/challenger_v2.pt
  timeframes:
    train_start: '2018-01-01'
    train_end: '2022-12-31'
    test_start: '2023-01-01'
    test_end: 'now'
    validation_split_pct: 0.15
  training:
    batch_size: 1024
    dropout: 0.4
    early_stopping_patience: 10
    epochs: 50
    lr: 0.002
    weight_decay: 0.0001
  training_dataset_path: data/train_dataset_v2_full.pt
risk_metacontroller:
  prior_belief: 0.5
signal_physics:
  fractional_differentiation:
    d_param: 0.4
  horizon_days: 5
  lookback_days: 63
  math_padding: 250
  wavelet_transform:
    scales:
    - 1
    - 2
    - 3
    - 4
    - 6
    - 8
    - 12
    - 16
    - 24
    - 32
    - 48
    - 64
    - 96
    - 128
    - 192
    - 256
    wavelet: mexh
ui_cockpit:
  update_interval_ms: 1000
universe:
