# UQTS-2026 Institutional Configuration Matrix

universe:
  benchmark: "SPY"
  tickers: ["SPY", "NVDA", "TSM", "AAPL", "MSFT", "GOOG", "AMZN", "WMT", "COST", "UPS", "JPM", "GS", "V", "XOM", "CVX", "CAT", "TSLA", "META", "UNH", "LLY"]

data_engine:
  provider: "yfinance"              # Switched to yfinance for ease of use
  storage_type: "duckdb"            # Transitioning from in-memory pandas
  db_path: "./data/uqts_bitemporal.ddb"
  start_date: "2016-01-01"          # 2-Year burn-in buffer for d=0.4

signal_physics:
  lookback_days: 63                 # ~1 Trading Quarter
  horizon_days: 21                  # ~1 Trading Month
  math_padding: 100                 # Buffer for FD and Wavelet stability
  fractional_differentiation:
    d_param: 0.4
    window_type: "expanding"
  wavelet_transform:
    type: "morlet"
    scales: [2, 4, 8, 16, 32, 64, 128, 256] # Dyadic scales for spectrograms

model_pipeline:
  architecture:
    hidden_dim: 64
    vit_heads: 4                    # Vision Transformer heads for 2D Wavelets
    gnn_layers: 2                   # Graph layers for sector cross-talk
  training:
    loss_function: "pairwise_ranknet"
    epochs: 5
    lr: 0.001
    batch_size: 8192
    early_stopping_patience: 3
  model_path: "models/challenger_v1.pt" # Default production model
  wfo_engine:                       # Walk-Forward Optimization constraints
    train_window_months: 48         # 4 years of training
    test_window_months: 12          # 1 year out-of-sample validation
    step_months: 3                  # Retrain every quarter

risk_metacontroller:
  prior_belief: 0.62                # Conservative starting confidence
  min_belief_threshold: 0.75        # Scale down if P(Valid|Result) drops below 75%
  alpha_decay_halflife_days: 30
  hard_kill_drawdown_pct: 0.05      # 5% Max Drawdown -> Liquidate to Cash

execution_muscle:
  mode: "paper"                     # paper | live
  allocation_limit: 100000
  max_position_size: 0.1            # 10% max allocation per ticker
  oms:
    provider: "alpaca"
    base_url: "https://paper-api.alpaca.markets"
    websocket_enabled: true         # Listen for partial fills
  mpc_solver:                       # Constraints for the C++ Execution logic
    horizon: 5
    target_turnover: 0.15
    impact_penalty: 0.01
    variance_penalty: 0.05
    max_slippage_bps: 5.0           # Trigger "RL Agent Retune" warning if exceeded

ui_cockpit:
  update_interval_ms: 2000          # Increased for 20-ticker stability
  stream_start_offset_days: 120
  