# =====================================================================
# QTS2026 — v7.0 Sniper-Residual configuration
# Changes from prior version (see CHANGES.md):
#   - execution_muscle.max_single_asset_cap unified with rl_training_physics (0.15)
#   - execution_muscle.max_position_size lowered to match training (0.15)
#   - execution_muscle.live_trading explicit flag (must be true AND env ALPACA_LIVE=1)
#   - model_pipeline.model_path -> models/sniper_v7.pt (was challenger_v2.pt)
#   - model_pipeline.architecture.hidden_dim -> 32 (was 128, mismatched SniperRanker)
#   - signal_physics.fractional_differentiation.d_param annotated (currently disabled)
# =====================================================================

data_engine:
  features:
  - close
  - volume
  provider: alpaca
  start_date: '2019-01-01'
  storage_path: data/uqts_v2_intraday.ddb
  timeframe: 15Min

execution_muscle:
  allocation_temperature: 0.1
  latency_stress_test: true
  # Must match rl_training_physics.max_single_asset_cap to avoid
  # train/deploy regime drift. If you change one, change the other.
  max_position_size: 0.20
  max_single_asset_cap: 0.20
  min_belief_threshold: 0.65
  mpc_solver:
    horizon: 5
    impact_penalty: 0.01
    variance_penalty: 0.1
  oms:
    base_url: https://paper-api.alpaca.markets
  risk_parity_sizing: false
  safety_limits:
    kill_switch_enabled: true
    max_notional_per_order: 50000.0
    max_total_leverage: 3.0
  trading_mode: live
  # Explicit live-trading flag. Orders are only submitted if BOTH
  # this is true AND the env var ALPACA_LIVE=1 is set.
  live_trading: false

model_pipeline:
  architecture:
    gnn_layers: 2
    # hidden_dim reduced for better generalization on sparse alpha
    hidden_dim: 64
    vit_heads: 8
  evaluation_dataset_path: data/oos_steps_v2.pt
  # The Sniper-Residual strategy uses the SniperRanker TFT checkpoint.
  model_path: models/sniper_v7.pt
  rl_training:
    total_timesteps: 1000000
  timeframes:
    temporal_decay_lambda: 0.0025
    test_end: now
    test_start: '2024-01-01'
    train_end: '2023-12-31'
    train_start: '2019-01-01'
    validation_split_pct: 0.15
  training:
    batch_size: 1024
    dropout: 0.2
    early_stopping_patience: 30
    epochs: 100
    lr: 0.001
    weight_decay: 1.0e-04
  training_dataset_path: data/train_dataset_v2_full.pt

risk_metacontroller:
  prior_belief: 0.5

rl_training_physics:
  allocation_temperature: 0.5
  max_single_asset_cap: 0.20

signal_physics:
  fractional_differentiation:
    # d=0.05 preserves maximum signal memory while maintaining stationarity
    d_param: 0.05
  horizon_days: 5
  lookback_days: 63
  label_mode: directional
  math_padding: 250
  wavelet_transform:
    scales:
    - 1
    - 2
    - 3
    - 4
    - 6
    - 8
    - 12
    - 16
    - 24
    - 32
    - 48
    - 64
    - 96
    - 128
    - 192
    - 256
    wavelet: mexh

ui_cockpit:
  update_interval_ms: 1000

